    _option_module_: eden.options.managers.curricula
    _option_class_: CurriculumManagerOptions
  runner_options:
    seed: 42
    device: auto
    num_steps_per_env: 12
    max_iterations: 10000
    obs_groups:
      critic:
      - priv_proprio
      - priv_obj_state
      student:
      - proprio
      teacher:
      - priv_proprio
      - priv_obj_state
      rnd_state:
      - priv_proprio
      - priv_obj_state
      actor:
      - priv_proprio
      - priv_obj_state
    clip_actions: null
    save_interval: 500
    check_for_nan: true
    experiment_name: screwdriver
    run_name: 0523a-screwdriver-sharpa-no_tactile
    logger: wandb
    neptune_project: eden
    wandb_project: eden-screwdriver
    resume: false
    load_run: .*
    load_checkpoint: model_.*.pt
    class_name: OnPolicyRunner
    actor:
      class_name: MLPModel
      hidden_dims:
      - 512
      - 256
      - 128
      activation: elu
      obs_normalization: true
      distribution_cfg:
        class_name: GaussianDistribution
        init_std: 1.0
        std_type: log
        _option_module_: eden.options.learning.rsl_rl.rl
        _option_class_: RslRlGaussianDistributionOptions
      _option_module_: eden.options.learning.rsl_rl.rl
      _option_class_: RslRlModelWithDistributionOptions
    critic:
      class_name: MLPModel
      hidden_dims:
      - 512
      - 256
      - 128
      activation: elu
      obs_normalization: true
      _option_module_: eden.options.learning.rsl_rl.rl
      _option_class_: RslRlModelOptions
    algorithm:
      class_name: PPO
      num_learning_epochs: 5
      num_mini_batches: 4
      learning_rate: 0.001
      schedule: adaptive
      gamma: 0.99
      lam: 0.95
      entropy_coef: 0.0
      desired_kl: 0.02
      max_grad_norm: 1.0
      value_loss_coef: 1.0
      use_clipped_value_loss: true
      clip_param: 0.2
      normalize_advantage_per_mini_batch: false
      share_cnn_encoders: false
      rnd_cfg:
        weight: 100.0
        weight_schedule: null
        reward_normalization: true
        state_normalization: true
        learning_rate: 0.001
        num_outputs: 8
        predictor_hidden_dims:
        - -1
        target_hidden_dims:
        - -1
        _option_module_: eden.options.learning.rsl_rl.rnd
        _option_class_: RslRlRndOptions
      symmetry_cfg: null
      _option_module_: eden.options.learning.rsl_rl.rl
      _option_class_: RslRlPpoAlgorithmOptions
    empirical_normalization: true
    _option_module_: eden.options.learning.rsl_rl.rl
    _option_class_: RslRlOnPolicyRunnerOptions
    enable_print: false
